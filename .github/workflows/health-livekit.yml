name: "Health: LiveKit"
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
permissions: {}
jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Primary
            secret_key: LIVEKIT_URL
            api_key_secret: LIVEKIT_API_KEY
            api_secret_secret: LIVEKIT_API_SECRET
          - name: Key 2
            secret_key: LIVEKIT_URL_2
            api_key_secret: LIVEKIT_API_KEY_2
            api_secret_secret: LIVEKIT_API_SECRET_2
          # Add more entries here when adding keys 3+
    steps:
      - name: Check LiveKit (${{ matrix.name }})
        id: check
        env:
          LK_URL_PRIMARY: ${{ secrets.LIVEKIT_URL }}
          LK_URL_2: ${{ secrets.LIVEKIT_URL_2 }}
          LK_KEY_PRIMARY: ${{ secrets.LIVEKIT_API_KEY }}
          LK_KEY_2: ${{ secrets.LIVEKIT_API_KEY_2 }}
          LK_SECRET_PRIMARY: ${{ secrets.LIVEKIT_API_SECRET }}
          LK_SECRET_2: ${{ secrets.LIVEKIT_API_SECRET_2 }}
        run: |
          case "${{ matrix.secret_key }}" in
            LIVEKIT_URL)   LK_URL="$LK_URL_PRIMARY"; LK_KEY="$LK_KEY_PRIMARY"; LK_SEC="$LK_SECRET_PRIMARY" ;;
            LIVEKIT_URL_2) LK_URL="$LK_URL_2"; LK_KEY="$LK_KEY_2"; LK_SEC="$LK_SECRET_2" ;;
          esac

          if [ -z "$LK_URL" ]; then
            echo "${{ matrix.name }}: not configured - skipping"
            echo "status=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Step 1: Check server is reachable
          HTTP_URL=$(echo "$LK_URL" | sed 's|^wss://|https://|;s|^ws://|http://|')
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HTTP_URL")
          if [ "$STATUS" -eq 000 ] || [ "$STATUS" -ge 500 ]; then
            echo "::error::${{ matrix.name }} is DOWN ($STATUS)"
            echo "status=down" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          # Step 2: Generate a test JWT and validate against LiveKit (detects quota exhaustion)
          if [ -n "$LK_KEY" ] && [ -n "$LK_SEC" ]; then
            # Create a minimal JWT: header.payload.signature
            HEADER=$(echo -n '{"alg":"HS256"}' | base64 -w0 | tr '+/' '-_' | tr -d '=')
            NOW=$(date +%s)
            EXP=$((NOW + 60))
            PAYLOAD=$(echo -n "{\"iss\":\"$LK_KEY\",\"exp\":$EXP,\"nbf\":0,\"sub\":\"health-check\",\"video\":{\"room\":\"HEALTHCHECK\",\"roomJoin\":true,\"roomCreate\":true}}" | base64 -w0 | tr '+/' '-_' | tr -d '=')
            SIG=$(echo -n "$HEADER.$PAYLOAD" | openssl dgst -sha256 -hmac "$LK_SEC" -binary | base64 -w0 | tr '+/' '-_' | tr -d '=')
            TOKEN="$HEADER.$PAYLOAD.$SIG"

            VALIDATE_URL="$HTTP_URL/rtc/v1/validate?access_token=$TOKEN"
            RESPONSE=$(curl -s -w "\n%{http_code}" "$VALIDATE_URL")
            V_CODE=$(echo "$RESPONSE" | tail -1)
            V_BODY=$(echo "$RESPONSE" | head -1)

            if [ "$V_CODE" -eq 429 ]; then
              echo "::error::${{ matrix.name }} QUOTA EXHAUSTED: $V_BODY"
              echo "status=down" >> "$GITHUB_OUTPUT"
              exit 1
            fi
            echo "${{ matrix.name }}: Server OK ($STATUS), Token validated ($V_CODE)"
          else
            echo "${{ matrix.name }}: Server OK ($STATUS) (no API key to validate quota)"
          fi

          echo "status=ok" >> "$GITHUB_OUTPUT"

      - name: Write result artifact
        if: always()
        run: |
          mkdir -p /tmp/results
          echo "${{ steps.check.outputs.status || 'down' }}" > "/tmp/results/${{ matrix.name }}"

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ matrix.name }}
          path: /tmp/results/

  badge:
    needs: check
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: results/
          merge-multiple: true

      - name: Compute badge
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.HEALTH_BADGE_GIST_ID }}
        run: |
          OK=0
          RATELIMITED=0
          DOWN=0
          TOTAL=0

          for f in results/*; do
            STATUS=$(cat "$f")
            case "$STATUS" in
              ok) OK=$((OK+1)); TOTAL=$((TOTAL+1)) ;;
              ratelimited) RATELIMITED=$((RATELIMITED+1)); TOTAL=$((TOTAL+1)) ;;
              down) DOWN=$((DOWN+1)); TOTAL=$((TOTAL+1)) ;;
            esac
          done

          echo "OK=$OK RATELIMITED=$RATELIMITED DOWN=$DOWN TOTAL=$TOTAL"

          if [ "$DOWN" -eq "$TOTAL" ] && [ "$TOTAL" -gt 0 ]; then
            COLOR="red"
            MSG="all down"
          elif [ "$DOWN" -gt 0 ]; then
            COLOR="red"
            MSG="${DOWN}/${TOTAL} down"
          elif [ "$RATELIMITED" -eq "$TOTAL" ] && [ "$TOTAL" -gt 0 ]; then
            COLOR="orange"
            MSG="all rate-limited"
          elif [ "$RATELIMITED" -gt 0 ]; then
            COLOR="yellow"
            MSG="${RATELIMITED}/${TOTAL} rate-limited"
          else
            COLOR="brightgreen"
            MSG="${OK}/${TOTAL} healthy"
          fi

          echo "Badge: $MSG ($COLOR)"

          if [ -z "$GIST_TOKEN" ]; then
            echo "::warning::GIST_TOKEN not set - badge won't update."
            exit 0
          fi

          JSON=$(jq -n --arg msg "$MSG" --arg color "$COLOR" \
            '{schemaVersion:1,label:"LiveKit",message:$msg,color:$color}')
          PAYLOAD=$(jq -n --arg content "$JSON" \
            '{"files":{"livekit-health.json":{"content":$content}}}')
          curl -s -X PATCH "https://api.github.com/gists/$GIST_ID" \
            -H "Authorization: token $GIST_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -d "$PAYLOAD"
